var TYPE_ORDER = ['Sisak','Pajzs','Páncél','Csizma','Ütő/Zúzó','Szúró/Vágó','Távolsági'];
var TYPE_ICONS = {'Ütő/Zúzó':'🔨','Szúró/Vágó':'🗡','Távolsági':'🏹','Pajzs':'🛡','Páncél':'🛡','Sisak':'⛑','Csizma':'👢'};

function kereses() {
  var szint = parseInt(document.getElementById('szint_input').value);
  if (isNaN(szint)) { alert('Adj meg egy szintszámot!'); return; }

  // Update URL so browser back button restores the search
  history.pushState({szint: szint}, '', 'kereses.html?szint=' + szint);

  renderResults(szint);
}

function renderResults(szint) {
  var grouped = {};
  TYPE_ORDER.forEach(function(t) { grouped[t] = []; });

  TYPE_ORDER.forEach(function(tipus) {
    var maxSzint = -1;
    ITEMS.forEach(function(item) {
      if (item.tipus === tipus && item.szint <= szint && item.szint > maxSzint) {
        maxSzint = item.szint;
      }
    });
    if (maxSzint < 0) return;
    ITEMS.forEach(function(item) {
      if (item.tipus === tipus && item.szint === maxSzint) {
        grouped[tipus].push(item);
      }
    });
  });

  var html = '';
  var anyFound = false;

  TYPE_ORDER.forEach(function(tipus) {
    var list = grouped[tipus];
    if (!list.length) return;
    anyFound = true;
    var icon = TYPE_ICONS[tipus] || '';
    html += '<div style="margin-bottom:8px">';
    html += '<div class="section-title">' + icon + ' ' + tipus + ' (Szint ' + list[0].szint + ')</div>';
    html += '<table class="eredmeny"><tbody>';
    html += '<tr><th class="eredmenyfejlec">Név</th><th class="eredmenyfejlec">Szint</th></tr>';
    list.forEach(function(item) {
      // Link carries ?szint=X so clicking back in the item page's browser history
      // returns here with the search intact
      html += '<tr>';
      html += '<td class="eredmenycella"><a href="' + item.file + '?vissza=' + szint + '#item_' + item.id + '">' + item.neve + '</a></td>';
      html += '<td class="eredmenycella">' + item.szint + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  });

  if (!anyFound) {
    html = '<p class="no-results">Nem található felszerelés erre a szintre.</p>';
  }

  document.getElementById('eredmeny').innerHTML = html;
}

// Read ?szint= from URL on load
document.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var szint = parseInt(params.get('szint'));
  if (!isNaN(szint)) {
    document.getElementById('szint_input').value = szint;
    renderResults(szint);
  }

  document.getElementById('szint_input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') kereses();
  });

  // Handle browser back/forward
  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.szint) {
      document.getElementById('szint_input').value = e.state.szint;
      renderResults(e.state.szint);
    }
  });
});
</script>
